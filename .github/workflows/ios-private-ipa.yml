name: iOS Private IPA

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "the-sfm trader server URL. Use HTTPS for TestFlight/App Store."
        required: true
        default: "http://192.168.255.180:4173"
      export_method:
        description: "Xcode export method. Common: app-store-connect, release-testing, debugging. Older Xcode: app-store, ad-hoc, development."
        required: true
        default: "app-store-connect"
      upload_testflight:
        description: "Upload the generated IPA to TestFlight"
        required: true
        type: boolean
        default: false

jobs:
  build-ipa:
    name: Build signed iPhone app
    runs-on: macos-15

    env:
      BUNDLE_ID: com.malq.thesfmtrader
      SCHEME: App
      PROJECT: ios/App/App.xcodeproj
      ARCHIVE_PATH: ${{ runner.temp }}/the-sfm-trader.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/ios
      KEYCHAIN_PATH: ${{ runner.temp }}/the-sfm-trader-signing.keychain-db
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          test -n "$APPLE_TEAM_ID" || (echo "Missing APPLE_TEAM_ID" && exit 1)
          test -n "$IOS_CERTIFICATE_BASE64" || (echo "Missing IOS_CERTIFICATE_BASE64" && exit 1)
          test -n "$IOS_CERTIFICATE_PASSWORD" || (echo "Missing IOS_CERTIFICATE_PASSWORD" && exit 1)
          test -n "$IOS_PROVISION_PROFILE_BASE64" || (echo "Missing IOS_PROVISION_PROFILE_BASE64" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set iOS server URL
        run: node tools/set-ios-server-url.mjs "${{ inputs.server_url }}"

      - name: Sync iOS project
        run: npx cap sync ios

      - name: Install signing certificate and provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/the-sfm-trader-certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/the-sfm-trader.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/the-sfm-trader-profile.plist"

          echo "$IOS_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Create export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p "$EXPORT_PATH"
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          find "$EXPORT_PATH" -maxdepth 2 -type f -print

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-sfm-trader-iPhone-IPA
          path: build/ios/*.ipa
          if-no-files-found: error

      - name: Prepare App Store Connect API key
        if: ${{ inputs.upload_testflight }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          test -n "$APP_STORE_CONNECT_KEY_ID" || (echo "Missing APP_STORE_CONNECT_KEY_ID" && exit 1)
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "Missing APP_STORE_CONNECT_ISSUER_ID" && exit 1)
          test -n "$APP_STORE_CONNECT_API_KEY_BASE64" || (echo "Missing APP_STORE_CONNECT_API_KEY_BASE64" && exit 1)
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Upload to TestFlight
        if: ${{ inputs.upload_testflight }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "$EXPORT_PATH" -name "*.ipa" -print -quit)
          test -n "$IPA_PATH" || (echo "IPA not found" && exit 1)
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
